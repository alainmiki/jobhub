{% extends "layout.html" %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-16 px-4">
  <div class="text-center">
    <i class="fas fa-exclamation-triangle text-6xl text-warning mb-6"></i>
    <h1 class="text-4xl font-bold mb-4">{{ title or 'Oops!' }}</h1>
    <p class="text-xl text-base-content/70 mb-8">{{ message or 'Something went wrong.' }}</p>
    <a href="/" class="btn btn-primary">Go Home</a>
  </div>
</div>
{% endblock %}
