{% extends "layout.html" %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center py-12 px-4 hero-pattern">
  <div class="w-full max-w-md">
    <div class="text-center mb-8 gsap-reveal">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-primary to-secondary shadow-lg shadow-primary/30 mb-4">
        <i class="fa-solid fa-lock text-white text-xl"></i>
      </div>
      <h1 class="text-3xl font-bold tracking-tight mb-2">Reset Password</h1>
      <p class="text-base-content/60">Create a new password for your account</p>
    </div>
    
    <div class="card bg-base-100 shadow-xl rounded-2xl border border-base-200/50 card-border-glow gsap-reveal stagger-1">
      <div class="card-body p-6 sm:p-8">
        {% if error %}
        <div class="alert alert-error mb-4 rounded-xl bg-error/10 border border-error/20">
          <i class="fa-solid fa-circle-exclamation text-error"></i>
          <span class="text-sm">{{ error }}</span>
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success mb-4 rounded-xl bg-success/10 border border-success/20">
          <i class="fa-solid fa-circle-check text-success"></i>
          <span class="text-sm">{{ success }}</span>
        </div>
        {% endif %}

        <form id="resetPasswordForm" action="/reset-password" method="POST" class="space-y-5">
          <input type="hidden" name="_csrf" value="{{ csrfToken }}">
          <input type="hidden" name="token" value="{{ token }}">
          <input type="hidden" name="redirect" value="/sign-in">
          <input type="hidden" name="_gotcha">
          
          <div class="form-control">
            <label class="label py-2">
              <span class="label-text font-medium text-sm">New Password</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <i class="fa-solid fa-lock text-base-content/40"></i>
              </div>
              <input type="password" name="password" required minlength="8" 
                class="input input-bordered w-full pl-12 rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary focus:bg-base-100" 
                placeholder="Create a strong password" />
              <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-4 toggle-password" aria-label="Toggle password">
                <i class="fa-regular fa-eye text-base-content/40 hover:text-base-content"></i>
              </button>
            </div>
          </div>
          
          <div class="form-control">
            <label class="label py-2">
              <span class="label-text font-medium text-sm">Confirm Password</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <i class="fa-solid fa-lock text-base-content/40"></i>
              </div>
              <input type="password" name="confirmPassword" required minlength="8" 
                class="input input-bordered w-full pl-12 rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary focus:bg-base-100" 
                placeholder="Confirm your password" />
              <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-4 toggle-password" aria-label="Toggle password">
                <i class="fa-regular fa-eye text-base-content/40 hover:text-base-content"></i>
              </button>
            </div>
          </div>
          
          <div class="form-control mt-6">
            <button type="submit" class="btn btn-primary-gradient btn-block rounded-xl h-12 font-semibold shadow-primary/30 hover:shadow-lg">
              <span>Reset Password</span>
              <i class="fa-solid fa-check ml-2 text-sm"></i>
            </button>
          </div>
          
          <div class="text-center mt-4">
            <a href="/sign-in" class="text-sm text-base-content/60 hover:text-primary">
              <i class="fa-solid fa-arrow-left mr-1"></i>Back to Sign In
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
