{% extends "layout.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl font-bold text-center w-full mb-4">Reset Password</h2>
      <p class="text-base-content/70 text-center mb-6">Enter your new password below.</p>
      
      {% if error %}
      <div class="alert alert-error mb-4">
        <span>{{ error }}</span>
      </div>
      {% endif %}

      {% if success %}
      <div class="alert alert-success mb-4">
        <span>{{ success }}</span>
      </div>
      {% endif %}

      <form action="/api/auth/reset-password" method="POST" class="space-y-4">
        <input type="hidden" name="_gotcha" style="display:none">
        <input type="hidden" name="token" value="{{ token }}">
        <input type="hidden" name="_csrf" value="{{ csrfToken }}">
        
        <div class="form-control">
          <label class="label">
            <span class="label-text">New Password</span>
          </label>
          <input type="password" name="password" required minlength="8" class="input input-bordered" placeholder="••••••••" />
          <label class="label">
            <span class="label-text-alt">Must be at least 8 characters</span>
          </label>
        </div>
        
        <div class="form-control">
          <label class="label">
            <span class="label-text">Confirm New Password</span>
          </label>
          <input type="password" name="confirmPassword" required minlength="8" class="input input-bordered" placeholder="••••••••" />
        </div>
        
        <div class="form-control mt-6">
          <button type="submit" class="btn btn-primary">Reset Password</button>
        </div>
      </form>
      
      <div class="divider">OR</div>
      
      <div class="text-center">
        <p class="text-base-content/70">Remember your password? <a href="/sign-in" class="link link-primary">Sign in</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
