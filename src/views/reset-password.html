{% extends "layout.html" %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-4 bg-base-200/30">
  <div class="w-full max-w-md">
    <div class="card bg-base-100 border border-base-200 shadow-xl">
      <div class="card-body p-8">
        <h2 class="text-2xl font-bold text-center mb-2">Reset Password</h2>
        <p class="text-base-content/70 text-center mb-6">Enter your new password below.</p>

        <!-- Error Message -->
        <div id="errorMessage" class="alert alert-error mb-4 hidden">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span></span>
        </div>

        <!-- Success Message -->
        <div id="successMessage" class="alert alert-success mb-4 hidden">
          <i class="fa-solid fa-check-circle"></i>
          <span>Password reset successfully!</span>
        </div>

        <!-- Invalid Token Error -->
        {% if tokenError %}
        <div class="alert alert-error mb-4">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span>{{ tokenError }}</span>
        </div>
        {% endif %}

        <form id="resetForm" class="space-y-5">
          <input type="hidden" id="token" name="token" value="{{ token }}">
          
          <div class="form-control">
            <label class="label">
              <span class="label-text font-medium">New Password</span>
            </label>
            <div class="relative">
              <input type="password" id="password" name="password" required minlength="8" class="input input-bordered w-full pl-10" placeholder="••••••••" />
              <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40"></i>
            </div>
            <label class="label">
              <span class="label-text-alt text-xs">Must be at least 8 characters</span>
            </label>
          </div>
          
          <div class="form-control">
            <label class="label">
              <span class="label-text font-medium">Confirm New Password</span>
            </label>
            <div class="relative">
              <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" class="input input-bordered w-full pl-10" placeholder="••••••••" />
              <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40"></i>
            </div>
          </div>
          
          <div id="passwordMatchError" class="text-error text-sm hidden">Passwords do not match</div>

          <div class="form-control mt-6">
            <button type="submit" id="submitBtn" class="btn btn-primary btn-block rounded-full">
              <span>Reset Password</span>
              <i class="fa-solid fa-key ml-2"></i>
            </button>
          </div>
        </form>

        <div class="divider my-6">OR</div>

        <div class="text-center">
          <p class="text-base-content/70">Remember your password? 
            <a href="/sign-in" class="link link-primary font-medium">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { authClient, resetPassword } from '/js/auth-client.js';

const token = document.getElementById('token').value;

if (!token) {
  document.getElementById('errorMessage').querySelector('span').textContent = 'Invalid reset token. Please request a new password reset.';
  document.getElementById('errorMessage').classList.remove('hidden');
  document.getElementById('resetForm').classList.add('hidden');
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const submitBtn = document.getElementById('submitBtn');
  const errorMessage = document.getElementById('errorMessage');
  const successMessage = document.getElementById('successMessage');
  const passwordMatchError = document.getElementById('passwordMatchError');
  
  // Validate passwords match
  if (password !== confirmPassword) {
    passwordMatchError.classList.remove('hidden');
    return;
  }
  passwordMatchError.classList.add('hidden');
  
  // Validate password length
  if (password.length < 8) {
    errorMessage.querySelector('span').textContent = 'Password must be at least 8 characters';
    errorMessage.classList.remove('hidden');
    return;
  }
  
  // Clear messages
  errorMessage.classList.add('hidden');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="loading loading-spinner"></span> Resetting...';
  
  try {
    const result = await resetPassword(password, token);
    
    if (!result.success) {
      errorMessage.querySelector('span').textContent = result.error.message || 'Failed to reset password. The token may be expired.';
      errorMessage.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<span>Reset Password</span><i class="fa-solid fa-key ml-2"></i>';
      return;
    }
    
    // Show success and redirect
    successMessage.classList.remove('hidden');
    submitBtn.classList.add('hidden');
    
    // Redirect to sign in after 2 seconds
    setTimeout(() => {
      window.location.href = '/sign-in?reset=true';
    }, 2000);
    
  } catch (error) {
    console.error('Reset password error:', error);
    errorMessage.querySelector('span').textContent = 'An unexpected error occurred. Please try again.';
    errorMessage.classList.remove('hidden');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<span>Reset Password</span><i class="fa-solid fa-key ml-2"></i>';
  }
});
</script>
{% endblock %}
