{% extends "layout.html" %}

{% block content %}
<div class="max-w-2xl mx-auto py-8 px-4">
  <div class="text-center mb-8 gsap-reveal">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-primary to-secondary shadow-lg shadow-primary/30 mb-4">
      <i class="fa-solid fa-building text-white text-xl"></i>
    </div>
    <h1 class="text-3xl font-bold tracking-tight mb-2">Create Company Profile</h1>
    <p class="text-base-content/60">Set up your company to start posting jobs</p>
  </div>
  
  <form action="/company" method="POST" class="space-y-6">
    <input type="hidden" name="_csrf" value="{{ csrfToken }}">
    
    <div class="card bg-base-100 shadow-sm border border-base-200/50 rounded-2xl gsap-reveal stagger-1">
      <div class="card-body p-6">
        <h2 class="font-bold text-lg mb-5 flex items-center gap-2">
          <i class="fa-solid fa-building text-primary"></i>Company Details
        </h2>
        
        <div class="form-control">
          <label class="label py-2">
            <span class="label-text font-medium text-sm">Company Name</span>
          </label>
          <input type="text" name="name" required 
            class="input input-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary" />
        </div>
        
        <div class="form-control mt-4">
          <label class="label py-2">
            <span class="label-text font-medium text-sm">Description</span>
          </label>
          <textarea name="description" required 
            class="textarea textarea-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary" 
            rows="4" placeholder="Tell candidates about your company..."></textarea>
        </div>
      </div>
    </div>
    
    <div class="card bg-base-100 shadow-sm border border-base-200/50 rounded-2xl gsap-reveal stagger-2">
      <div class="card-body p-6">
        <h2 class="font-bold text-lg mb-5 flex items-center gap-2">
          <i class="fa-solid fa-sliders text-primary"></i>Company Info
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-control">
            <label class="label py-2">
              <span class="label-text font-medium text-sm">Industry</span>
            </label>
            <select name="industry" required 
              class="select select-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary">
              <option value="">Select Industry</option>
              <option value="Technology">Technology</option>
              <option value="Finance">Finance</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Education">Education</option>
              <option value="Retail">Retail</option>
              <option value="Manufacturing">Manufacturing</option>
              <option value="Media">Media</option>
              <option value="Consulting">Consulting</option>
              <option value="Other">Other</option>
            </select>
          </div>
          
          <div class="form-control">
            <label class="label py-2">
              <span class="label-text font-medium text-sm">Company Size</span>
            </label>
            <select name="size" required 
              class="select select-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary">
              <option value="">Select Size</option>
              <option value="1-10">1-10 employees</option>
              <option value="11-50">11-50 employees</option>
              <option value="51-200">51-200 employees</option>
              <option value="201-500">201-500 employees</option>
              <option value="501-1000">501-1000 employees</option>
              <option value="1000+">1000+ employees</option>
            </select>
          </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
          <div class="form-control">
            <label class="label py-2">
              <span class="label-text font-medium text-sm">Headquarters</span>
            </label>
            <input type="text" name="headquarters" 
              class="input input-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary" 
              placeholder="City, Country" />
          </div>
          
          <div class="form-control">
            <label class="label py-2">
              <span class="label-text font-medium text-sm">Website</span>
            </label>
            <input type="url" name="website" 
              class="input input-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary" 
              placeholder="https://example.com" />
          </div>
        </div>
      </div>
    </div>
    
    <div class="form-control gsap-reveal">
      <button type="submit" class="btn btn-primary-gradient btn-block rounded-xl h-12 font-semibold shadow-primary/30 hover:shadow-lg">
        <span>Create Company</span>
        <i class="fa-solid fa-check ml-2"></i>
      </button>
    </div>
  </form>
</div>
{% endblock %}
