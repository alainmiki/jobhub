{% extends "layout.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
  <div class="card w-full max-w-lg bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl font-bold text-center w-full mb-4">Edit Company</h2>
      
      {% if error %}
      <div class="alert alert-error mb-4">
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form action="/company/{{ company._id }}?_method=PUT" method="POST" class="space-y-4">
        <input type="hidden" name="_gotcha" style="display:none">
        <input type="hidden" name="_csrf" value="{{ csrfToken }}">
        
        <div class="form-control">
          <label class="label">
            <span class="label-text">Company Name</span>
          </label>
          <input type="text" name="name" required value="{{ company.name or '' }}" class="input input-bordered" />
        </div>
        
        <div class="form-control">
          <label class="label">
            <span class="label-text">Industry</span>
          </label>
          <input type="text" name="industry" value="{{ company.industry or '' }}" class="input input-bordered" />
        </div>
        
        <div class="form-control">
          <label class="label">
            <span class="label-text">Company Size</span>
          </label>
          <select name="size" class="select select-bordered">
            <option value="">Select size</option>
            <option value="1-10" {% if company.size == '1-10' %}selected{% endif %}>1-10</option>
            <option value="11-50" {% if company.size == '11-50' %}selected{% endif %}>11-50</option>
            <option value="51-200" {% if company.size == '51-200' %}selected{% endif %}>51-200</option>
            <option value="201-500" {% if company.size == '201-500' %}selected{% endif %}>201-500</option>
            <option value="501-1000" {% if company.size == '501-1000' %}selected{% endif %}>501-1000</option>
            <option value="1000+" {% if company.size == '1000+' %}selected{% endif %}>1000+</option>
          </select>
        </div>
        
        <div class="form-control">
          <label class="label">
            <span class="label-text">Description</span>
          </label>
          <textarea name="description" class="textarea textarea-bordered" rows="4">{{ company.description or '' }}</textarea>
        </div>
        
        <div class="form-control">
          <label class="label">
            <span class="label-text">Headquarters</span>
          </label>
          <input type="text" name="headquarters" value="{{ company.headquarters or '' }}" class="input input-bordered" />
        </div>
        
        <div class="form-control">
          <label class="label">
            <span class="label-text">Website</span>
          </label>
          <input type="url" name="website" value="{{ company.website or '' }}" class="input input-bordered" placeholder="https://example.com" />
        </div>
        
        <div class="form-control mt-6">
          <button type="submit" class="btn btn-primary">Update Company</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
