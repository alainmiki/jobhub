{% extends "layout.html" %}

{% block content %}
<div class="min-h-screen bg-base-200/30 py-8 px-4">
  <div class="max-w-2xl mx-auto">
    <div class="card bg-base-100 shadow-lg rounded-2xl">
      <div class="card-body text-center py-16">
        <div class="w-24 h-24 mx-auto mb-6 rounded-2xl bg-primary/10 flex items-center justify-center">
          <i class="fa-solid fa-user text-4xl text-primary"></i>
        </div>
        <h2 class="font-bold text-2xl mb-4">Redirecting to Your Profile</h2>
        <p class="text-base-content/60 mb-6">Please wait while we redirect you to your profile page.</p>
        <a href="/profile" class="btn btn-primary rounded-xl">
          <i class="fa-solid fa-arrow-right mr-2"></i>Go to My Profile
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  window.location.href = '/profile';
</script>
{% endblock %}
