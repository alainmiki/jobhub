{% extends "layout.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 p-6 bg-white shadow-md rounded-lg">
    <h1 class="text-2xl font-bold mb-4">Your Profile</h1>
    <div class="flex items-center space-x-4 mb-6">
        <img src="{{ user.image or 'https://via.placeholder.com/100' }}" alt="Avatar" class="w-20 h-20 rounded-full">
        <div>
            <p class="text-xl font-semibold">{{ user.name }}</p>
            <p class="text-gray-600">{{ user.email }}</p>
            <span class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded mt-2 uppercase">{{ user.role }}</span>
        </div>
    </div>
    <a href="/logout" class="text-red-600 hover:underline">Logout</a>
</div>
{% endblock %}
