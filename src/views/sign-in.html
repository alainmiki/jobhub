{% extends "layout.html" %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-4 bg-base-200/30">
  <div class="w-full max-w-md">
    <!-- Logo/Brand -->
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 text-2xl font-bold text-primary">
        <i class="fa-solid fa-briefcase"></i>
        <span>JobHub</span>
      </a>
    </div>
    
    <div class="card bg-base-100 border border-base-200 shadow-xl">
      <div class="card-body p-8">
        <h2 class="text-2xl font-bold text-center mb-2">Welcome Back</h2>
        <p class="text-center text-base-content/60 mb-6">Sign in to continue to your account</p>
        
        <!-- Error/Success Messages -->
        <div id="messageContainer" class="hidden mb-4"></div>

        <form id="signinForm" class="space-y-5">
          <input type="hidden" name="redirect" value="{{ redirect or '/' }}">
          
          <div class="form-control">
            <label class="label">
              <span class="label-text font-medium">Email Address</span>
            </label>
            <div class="relative">
              <input type="email" id="email" name="email" required class="input input-bordered w-full pl-10" placeholder="you@example.com" />
              <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40"></i>
            </div>
          </div>
          
          <div class="form-control">
            <label class="label">
              <span class="label-text font-medium">Password</span>
            </label>
            <div class="relative">
              <input type="password" id="password" name="password" required class="input input-bordered w-full pl-10" placeholder="••••••••" />
              <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40"></i>
            </div>
            <label class="label">
              <a href="/forgot-password" class="label-text-alt link link-hover text-sm">Forgot password?</a>
            </label>
          </div>
          
          <div id="errorMessage" class="text-error text-sm hidden"></div>

          <div class="form-control mt-2">
            <button type="submit" id="submitBtn" class="btn btn-primary btn-block rounded-full">
              <span class=" Sign In">Sign In</span>
              <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
          </div>
        </form>
        
        <div class="divider my-6">OR</div>
        
        <div class="text-center">
          <p class="text-base-content/70">Don't have an account? 
            <a href="/sign-up?{{ redirectQuery }}" class="link link-primary font-medium">Create one</a>
          </p>
        </div>
      </div>
    </div>
    
    <p class="text-center text-sm text-base-content/50 mt-6">
      By signing in, you agree to our <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a>
    </p>
  </div>
</div>

<script type="module">
import { authClient, signIn } from '/js/auth-client.js';

document.getElementById('signinForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const redirect = document.querySelector('input[name="redirect"]').value || '/dashboard';
  const submitBtn = document.getElementById('submitBtn');
  const errorMessage = document.getElementById('errorMessage');
  
  // Clear previous errors
  errorMessage.classList.add('hidden');
  errorMessage.textContent = '';
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="loading loading-spinner"></span> Signing in...';
  
  try {
    const result = await signIn(email, password);
    
    if (!result.success) {
      errorMessage.textContent = result.error.message || 'Sign in failed. Please try again.';
      errorMessage.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<span>Sign In</span><i class="fa-solid fa-arrow-right ml-2"></i>';
      return;
    }
    
    // Success - redirect to dashboard
    window.location.href = redirect;
    
  } catch (error) {
    console.error('Sign in error:', error);
    errorMessage.textContent = 'An unexpected error occurred. Please try again.';
    errorMessage.classList.remove('hidden');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<span>Sign In</span><i class="fa-solid fa-arrow-right ml-2"></i>';
  }
});
</script>
{% endblock %}
