{% extends "layout.html" %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-4 bg-base-200/30">
  <div class="w-full max-w-md">
    <div class="card bg-base-100 border border-base-200 shadow-xl">
      <div class="card-body p-8">
        <h2 class="text-2xl font-bold text-center mb-2">Forgot Password</h2>
        <p class="text-base-content/70 text-center mb-6">Enter your email address and we'll send you a link to reset your password.</p>

        <!-- Success Message -->
        <div id="successMessage" class="alert alert-success mb-4 hidden">
          <i class="fa-solid fa-check-circle"></i>
          <span>Password reset link sent! Check your email.</span>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="alert alert-error mb-4 hidden">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span></span>
        </div>

        <form id="forgotForm" class="space-y-5">
          <div class="form-control">
            <label class="label">
              <span class="label-text font-medium">Email Address</span>
            </label>
            <div class="relative">
              <input type="email" id="email" name="email" required class="input input-bordered w-full pl-10" placeholder="you@example.com" />
              <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40"></i>
            </div>
          </div>

          <div class="form-control mt-6">
            <button type="submit" id="submitBtn" class="btn btn-primary btn-block rounded-full">
              <span>Send Reset Link</span>
              <i class="fa-solid fa-paper-plane ml-2"></i>
            </button>
          </div>
        </form>

        <div class="divider my-6">OR</div>

        <div class="text-center">
          <p class="text-base-content/70">Remember your password? 
            <a href="/sign-in" class="link link-primary font-medium">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { authClient, requestPasswordReset } from '/js/auth-client.js';

document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value;
  const submitBtn = document.getElementById('submitBtn');
  const errorMessage = document.getElementById('errorMessage');
  const successMessage = document.getElementById('successMessage');
  
  // Clear messages
  errorMessage.classList.add('hidden');
  successMessage.classList.add('hidden');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="loading loading-spinner"></span> Sending...';
  
  try {
    const result = await requestPasswordReset(email);
    
    if (!result.success) {
      errorMessage.querySelector('span').textContent = result.error.message || 'Failed to send reset link. Please try again.';
      errorMessage.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<span>Send Reset Link</span><i class="fa-solid fa-paper-plane ml-2"></i>';
      return;
    }
    
    // Show success message
    successMessage.classList.remove('hidden');
    submitBtn.classList.add('hidden');
    
  } catch (error) {
    console.error('Forgot password error:', error);
    errorMessage.querySelector('span').textContent = 'An unexpected error occurred. Please try again.';
    errorMessage.classList.remove('hidden');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<span>Send Reset Link</span><i class="fa-solid fa-paper-plane ml-2"></i>';
  }
});
</script>
{% endblock %}
