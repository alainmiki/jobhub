{% extends "layout.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl font-bold text-center w-full mb-4">Forgot Password</h2>
      <p class="text-base-content/70 text-center mb-6">Enter your email address and we'll send you a link to reset your password.</p>

      {% if error %}
      <div class="alert alert-error mb-4">
        <span>{{ error }}</span>
      </div>
      {% endif %}

      {% if success %}
      <div class="alert alert-success mb-4">
        <span>{{ success }}</span>
      </div>
      {% endif %}

      <form id="forgotForm" data-auth-type="forgot" action="/api/auth/forget-password" method="POST" class="space-y-4">
        <input type="hidden" name="_gotcha" style="display:none">
        <input type="hidden" name="_csrf" value="{{ csrfToken }}">

        <div class="form-control">
          <label class="label">
            <span class="label-text">Email Address</span>
          </label>
          <input type="email" name="email" required class="input input-bordered" placeholder="you@example.com" />
        </div>

        <div class="error-message text-error text-sm mt-2"></div>

        <div class="form-control mt-6">
          <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </div>
      </form>

      <div class="divider">OR</div>

      <div class="text-center">
        <p class="text-base-content/70">Remember your password? <a href="/sign-in" class="link link-primary">Sign in</a></p>
      </div>
</div>
<script src="/js/auth.js"></script>
{% endblock %}
