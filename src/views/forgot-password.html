{% extends "layout.html" %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center py-12 px-4 hero-pattern">
  <div class="w-full max-w-md">
    <div class="text-center mb-8 gsap-reveal">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-primary to-secondary shadow-lg shadow-primary/30 mb-4">
        <i class="fa-solid fa-key text-white text-xl"></i>
      </div>
      <h1 class="text-3xl font-bold tracking-tight mb-2">Forgot Password?</h1>
      <p class="text-base-content/60">No worries, we'll send you reset instructions</p>
    </div>
    
    <div class="card bg-base-100 shadow-xl rounded-2xl border border-base-200/50 card-border-glow gsap-reveal stagger-1">
      <div class="card-body p-6 sm:p-8">
        {% if error %}
        <div class="alert alert-error mb-4 rounded-xl bg-error/10 border border-error/20">
          <i class="fa-solid fa-circle-exclamation text-error"></i>
          <span class="text-sm">{{ error }}</span>
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success mb-4 rounded-xl bg-success/10 border border-success/20">
          <i class="fa-solid fa-circle-check text-success"></i>
          <span class="text-sm">{{ success }}</span>
        </div>
        {% endif %}

        <form id="forgotForm" action="/forgot-password" method="POST" class="space-y-5">
          <input type="hidden" name="_gotcha" style="display:none">
          <input type="hidden" name="_csrf" value="{{ csrfToken }}">
          
          <div class="form-control">
            <label class="label py-2">
              <span class="label-text font-medium text-sm">Email Address</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <i class="fa-regular fa-envelope text-base-content/40"></i>
              </div>
              <input type="email" name="email" required 
                class="input input-bordered w-full pl-12 rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary focus:bg-base-100" 
                placeholder="you@example.com" />
            </div>
          </div>
          
          <div class="form-control mt-6">
            <button type="submit" class="btn btn-primary-gradient btn-block rounded-xl h-12 font-semibold shadow-primary/30 hover:shadow-lg">
              <span>Reset Password</span>
              <i class="fa-solid fa-arrow-right ml-2 text-sm"></i>
            </button>
          </div>
        </form>
        
        <div class="divider my-6 text-base-content/40 text-sm">remember your password?</div>
        
        <div class="text-center">
          <a href="/sign-in" class="btn btn-outline btn-sm rounded-xl">
            <i class="fa-solid fa-right-to-bracket mr-2"></i>Sign In
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
