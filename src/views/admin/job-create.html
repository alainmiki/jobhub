{% extends "layout.html" %}

{% block content %}
<div class="min-h-screen bg-base-200/30 py-8 px-4">
  <div class="max-w-4xl mx-auto">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/10 mb-4">
        <i class="fa-solid fa-plus text-primary text-xl"></i>
      </div>
      <h1 class="text-3xl font-bold tracking-tight mb-2">Create Job</h1>
      <p class="text-base-content/60">Post a new job on behalf of a company</p>
    </div>

    <div class="card bg-base-100 shadow-sm border border-base-200/50 rounded-2xl">
      <div class="card-body p-6">
        {% if errorMessage and errorMessage.length > 0 %}
        <div class="alert alert-error mb-4 rounded-xl bg-error/10 border border-error/20">
          <i class="fa-solid fa-circle-exclamation text-error"></i>
          <div>
            <h4 class="font-semibold">Please fix the following errors:</h4>
            <ul class="list-disc list-inside mt-2">
              {% for error in errorMessage %}
              <li>{{ error }}</li>
              {% endfor %}
            </ul>
          </div>
        </div>
        {% endif %}

        <form action="/admin/jobs" method="POST" class="space-y-5">
          <input type="hidden" name="_csrf" value="{{ csrfToken }}">

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-control">
              <label class="label py-2">
                <span class="label-text font-medium text-sm">Company</span>
              </label>
              <select name="company" required class="select select-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary">
                <option value="">Select a company</option>
                {% for company in companies %}
                <option value="{{ company._id }}">{{ company.name }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="form-control">
              <label class="label py-2">
                <span class="label-text font-medium text-sm">Job Title</span>
              </label>
              <input type="text" name="title" required class="input input-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary" placeholder="e.g. Senior Software Engineer" />
            </div>
          </div>

          <div class="form-control">
            <label class="label py-2">
              <span class="label-text font-medium text-sm">Description</span>
            </label>
            <textarea name="description" required class="textarea textarea-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary" rows="6" placeholder="Describe the job responsibilities, requirements, and benefits..."></textarea>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="form-control">
              <label class="label py-2">
                <span class="label-text font-medium text-sm">Location</span>
              </label>
              <select name="location" required class="select select-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary">
                <option value="">Select location</option>
                <option value="Remote">Remote</option>
                <option value="On-site">On-site</option>
                <option value="Hybrid">Hybrid</option>
                <option value="Flexible">Flexible</option>
              </select>
            </div>

            <div class="form-control">
              <label class="label py-2">
                <span class="label-text font-medium text-sm">Job Type</span>
              </label>
              <select name="type" required class="select select-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary">
                <option value="">Select type</option>
                <option value="Full-time">Full-time</option>
                <option value="Part-time">Part-time</option>
                <option value="Contract">Contract</option>
                <option value="Internship">Internship</option>
                <option value="Freelance">Freelance</option>
              </select>
            </div>

            <div class="form-control">
              <label class="label py-2">
                <span class="label-text font-medium text-sm">Category</span>
              </label>
              <select name="category" class="select select-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary">
                <option value="Engineering">Engineering</option>
                <option value="Design">Design</option>
                <option value="Marketing">Marketing</option>
                <option value="Sales">Sales</option>
                <option value="Finance">Finance</option>
                <option value="HR">HR</option>
                <option value="Operations">Operations</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="form-control">
            <label class="label py-2">
              <span class="label-text font-medium text-sm">Skills (comma-separated)</span>
            </label>
            <input type="text" name="skills" class="input input-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary" placeholder="e.g. JavaScript, React, Node.js" />
          </div>

          <div class="form-control">
            <label class="label py-2">
              <span class="label-text font-medium text-sm">Requirements (one per line)</span>
            </label>
            <textarea name="requirements" class="textarea textarea-bordered rounded-xl bg-base-200/50 border-base-200/50 focus:border-primary" rows="4" placeholder="List job requirements..."></textarea>
          </div>

          <div class="form-control mt-6">
            <button type="submit" class="btn btn-primary-gradient btn-block rounded-xl h-12 font-semibold shadow-primary/30 hover:shadow-lg">
              <span>Create Job</span>
              <i class="fa-solid fa-plus ml-2"></i>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
