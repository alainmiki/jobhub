{% extends "layout.html" %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-4 bg-base-200/30">
  <div class="w-full max-w-md">
    <!-- Logo/Brand -->
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 text-2xl font-bold text-primary">
        <i class="fa-solid fa-briefcase"></i>
        <span>JobHub</span>
      </a>
    </div>
    
    <div class="card bg-base-100 border border-base-200 shadow-xl">
      <div class="card-body p-8">
        <h2 class="text-2xl font-bold text-center mb-2">Create Account</h2>
        <p class="text-center text-base-content/60 mb-6">Join thousands of professionals on JobHub</p>

        <!-- Error/Success Messages -->
        <div id="messageContainer" class="hidden mb-4"></div>

        <form id="signupForm" class="space-y-5">
          <input type="hidden" name="redirect" value="{{ redirect or '/' }}">
          
          <div class="form-control">
            <label class="label">
              <span class="label-text font-medium">Full Name</span>
            </label>
            <div class="relative">
              <input type="text" id="name" name="name" required class="input input-bordered w-full pl-10" placeholder="John Doe" />
              <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40"></i>
            </div>
          </div>

          <div class="form-control">
            <label class="label">
              <span class="label-text font-medium">Email Address</span>
            </label>
            <div class="relative">
              <input type="email" id="email" name="email" required class="input input-bordered w-full pl-10" placeholder="you@example.com" />
              <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40"></i>
            </div>
          </div>
          
          <div class="form-control">
            <label class="label">
              <span class="label-text font-medium">Password</span>
            </label>
            <div class="relative">
              <input type="password" id="password" name="password" required minlength="8" class="input input-bordered w-full pl-10" placeholder="••••••••" />
              <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40"></i>
            </div>
            <label class="label">
              <span class="label-text-alt text-xs">Minimum 8 characters</span>
            </label>
          </div>

          <div class="form-control">
            <label class="label">
              <span class="label-text font-medium">I am a:</span>
            </label>
            <div class="grid grid-cols-2 gap-4">
              <label class="cursor-pointer">
                <input type="radio" name="role" value="candidate" class="peer sr-only" checked />
                <div class="p-4 rounded-xl border-2 border-base-200 peer-checked:border-primary peer-checked:bg-primary/10 transition-all text-center">
                  <i class="fas fa-user text-2xl mb-2 block"></i>
                  <span class="font-medium">Candidate</span>
                </div>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="role" value="employer" class="peer sr-only" />
                <div class="p-4 rounded-xl border-2 border-base-200 peer-checked:border-primary peer-checked:bg-primary/10 transition-all text-center">
                  <i class="fas fa-building text-2xl mb-2 block"></i>
                  <span class="font-medium">Employer</span>
                </div>
              </label>
            </div>
          </div>
          
          <div id="errorMessage" class="text-error text-sm hidden"></div>

          <div class="form-control mt-2">
            <button type="submit" id="submitBtn" class="btn btn-primary btn-block rounded-full">
              <span>Create Account</span>
              <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
          </div>
        </form>
        
        <div class="divider my-6">OR</div>
        
        <div class="text-center">
          <p class="text-base-content/70">Already have an account? 
            <a href="/sign-in?{{ redirectQuery }}" class="link link-primary font-medium">Sign in</a>
          </p>
        </div>
      </div>
    </div>
    
    <p class="text-center text-sm text-base-content/50 mt-6">
      By signing up, you agree to our <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a>
    </p>
  </div>
</div>

<script type="module">
import { authClient, signUp } from '/js/auth-client.js';

document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const role = document.querySelector('input[name="role"]:checked').value;
  const redirect = document.querySelector('input[name="redirect"]').value || '/dashboard';
  const submitBtn = document.getElementById('submitBtn');
  const errorMessage = document.getElementById('errorMessage');
  
  // Client-side validation
  if (password.length < 8) {
    errorMessage.textContent = 'Password must be at least 8 characters';
    errorMessage.classList.remove('hidden');
    return;
  }
  
  // Clear previous errors
  errorMessage.classList.add('hidden');
  errorMessage.textContent = '';
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="loading loading-spinner"></span> Creating account...';
  
  try {
    const result = await signUp(name, email, password);
    
    if (!result.success) {
      errorMessage.textContent = result.error.message || 'Sign up failed. Please try again.';
      errorMessage.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<span>Create Account</span><i class="fa-solid fa-arrow-right ml-2"></i>';
      return;
    }
    
    // Success - redirect to dashboard
    window.location.href = redirect;
    
  } catch (error) {
    console.error('Sign up error:', error);
    errorMessage.textContent = 'An unexpected error occurred. Please try again.';
    errorMessage.classList.remove('hidden');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<span>Create Account</span><i class="fa-solid fa-arrow-right ml-2"></i>';
  }
});
</script>
{% endblock %}
